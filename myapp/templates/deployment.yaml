apiVersion: apps/v1
kind: Deployment
metadata:
   name: {{ .Values.appname }}
   namespace: {{ .Values.env }}
   labels:
      app: {{ .Values.app }}
      env: {{ .Values.env }}
spec:
   replicas: {{ .Values.replicas }}
   selector:
      matchLabels:
         app: {{ .Values.app }}
   template:
      metadata:
         labels:
            app: {{ .Values.app }}
      spec:
         containers:
         - name: nginx
           image: {{ .Values.image.repository }}:{{ .Values.image.tag}}
