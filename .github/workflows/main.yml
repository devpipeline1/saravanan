# CICD using GitHub actions
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'README.md'

jobs:

  # Stage 1: Lint & Test
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run YAML lint
      run: yamllint .

    - name: Lint Dockerfile
      uses: hadolint/hadolint-action@v3
      with:
        dockerfile: ./Dockerfile

    - name: Run Unit Tests
      run: |
        echo "Run your app tests here"
        # Example for Node.js:
        # npm install && npm test

  # Stage 2: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        scan-ref: .

  # Stage 3: Build & Push Docker image
  build:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

  # Stage 4: Update Helm chart
  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm chart
      run: |
        sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/myhelm/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "devpipe@gmail.com"
        git config --global user.name "devpipe"
        git add helm/myhelm/values.yaml
        git commit -m "Update tag in Helm chart"
        git push
